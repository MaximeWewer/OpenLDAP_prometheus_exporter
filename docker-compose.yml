services:
  # OpenLDAP Prometheus Exporter
  openldap-exporter:
    image: ghcr.io/maximewewer/openldap_prometheus_exporter:latest
    hostname: openldap-exporter
    container_name: openldap-exporter
    restart: unless-stopped
    # Run as the host user so a bind-mounted events directory
    # (OPENLDAP_EVENTS_OUTPUT on a filesystem path) is writable without a
    # world-writable chmod. Distroless/static images have no /etc/passwd so
    # passing a numeric UID:GID is mandatory. Override in production via
    # `UID=... GID=... docker compose up -d` or a `.env` file.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "9330:9330"
    environment:
      # ========================================
      # LDAP configuration (Required)
      # ========================================
      LDAP_URL: "ldap://host.docker.internal:389" # LDAP server URL
      LDAP_USERNAME: "cn=adminconfig,cn=config" # LDAP authentication username
      LDAP_PASSWORD: "adminpasswordconfig" # LDAP authentication password

      # ========================================
      # LDAP configuration (Optional)
      # ========================================
      LDAP_SERVER_NAME: "openldap-dev" # Server name for logs and metrics (default: openldap)
      LDAP_TLS: "false" # Use TLS for connection (default: false)
      LDAP_TIMEOUT: "10" # LDAP connection timeout in seconds (default: 10)
      LDAP_UPDATE_EVERY: "15" # Metrics update interval in seconds (default: 15)
      # LDAP_TLS_SKIP_VERIFY: "false"                 # Skip TLS certificate verification (default: false)
      # LDAP_TLS_CA: "/path/to/ca.crt"                # Path to CA certificate for TLS
      # LDAP_TLS_CERT: "/path/to/client.crt"          # Path to client certificate
      # LDAP_TLS_KEY: "/path/to/client.key"           # Path to client private key

      # ========================================
      # HTTP server configuration
      # ========================================
      LISTEN_ADDRESS: ":9330" # HTTP server listen address (default: :9330)
      # HTTP_READ_TIMEOUT: "10s"                      # HTTP read timeout (default: 10s)
      # HTTP_WRITE_TIMEOUT: "10s"                     # HTTP write timeout (default: 10s)
      # HTTP_IDLE_TIMEOUT: "60s"                      # HTTP idle timeout (default: 60s)
      # HTTP_SHUTDOWN_TIMEOUT: "30s"                  # Graceful shutdown timeout (default: 30s)

      # ========================================
      # Rate limiting configuration
      # ========================================
      # RATE_LIMIT_ENABLED: "true"                    # Enable/disable rate limiting (default: true)
      # RATE_LIMIT_REQUESTS: "30"                     # Requests per minute for /metrics (default: 30)
      # RATE_LIMIT_BURST: "10"                        # Burst size for /metrics (default: 10)
      # HEALTH_RATE_LIMIT_REQUESTS: "60"              # Requests per minute for /health (default: 60)
      # HEALTH_RATE_LIMIT_BURST: "20"                 # Burst size for /health (default: 20)

      # ========================================
      # Logging configuration
      # ========================================
      LOG_LEVEL: "INFO" # Log level: DEBUG, INFO, WARN, ERROR, FATAL (default: INFO)

      # ========================================
      # Metrics filtering configuration
      # ========================================
      # OPENLDAP_METRICS_INCLUDE: "connections,statistics,health"       # Only collect these metric groups
      # OPENLDAP_METRICS_EXCLUDE: "overlays,tls,backends"               # Exclude these metric groups
      # Available groups: connections, statistics, operations, threads, time, waiters, overlays, tls, backends, listeners, health, database, server, log, sasl, replication, ppolicy, accesslog

      # ========================================
      # Domain Component (DC) filtering
      # ========================================
      # OPENLDAP_DC_INCLUDE: "example,company,test"   # Only monitor these domain components
      # OPENLDAP_DC_EXCLUDE: "dev,staging"            # Exclude these domain components

      # ========================================
      # JSON events stream (ppolicy + accesslog derived events)
      # ========================================
      # Runs on its own ticker with its own reqStart cursor, independent of Prometheus scrapes.
      #
      # stdout (default, zero filesystem coupling) — recommended for container
      # deployments: let the json-file log driver above capture the stream and
      # ship it with your existing log pipeline (Promtail, Vector, …).
      # OPENLDAP_EVENTS_ENABLED: "true"
      # OPENLDAP_EVENTS_INTERVAL: "30s"
      # OPENLDAP_EVENTS_OUTPUT: "stdout"
      #
      # File output — uncomment the volume bind below as well. The file is
      # created with mode 0644 and owned by the user: directive above, so the
      # host directory must already be writable by that UID (or created with
      # `install -d -o $UID -g $GID ./openldap-events` before `docker compose up`).
      # OPENLDAP_EVENTS_OUTPUT: "/var/log/openldap-events/openldap-events-{date}.jsonl"
      # OPENLDAP_EVENTS_ROTATION: "daily"                  # none (default) or daily (rolls at UTC midnight)
      #
      # OPENLDAP_EVENTS_TYPES: "bind.failure,account.lock" # Optional allow-list, comma separated (default: all types)
      # Available event types: bind.success, bind.failure, account.lock, account.unlock,
      #                        password.change, password.reset_required,
      #                        write.add, write.modify, write.delete, write.modrdn

    # volumes:
    #   # Only needed when OPENLDAP_EVENTS_OUTPUT points at a filesystem path.
    #   # Create the host directory ahead of time with the expected owner:
    #   #   install -d -o $(id -u) -g $(id -g) ./openldap-events
    #   - ./openldap-events:/var/log/openldap-events

    healthcheck:
      # Probes /health, which reports unhealthy (503) once the LDAP circuit
      # breaker is OPEN — unlike "-version", which only proves the binary runs.
      test: ["CMD", "/openldap-exporter", "-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        "max-size": "10m"
        "max-file": "5"
