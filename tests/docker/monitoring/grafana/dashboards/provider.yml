apiVersion: 1

providers:
  - name: openldap
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 10
    options:
      # Repo dashboards are bind-mounted read-only here by the compose file.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
