# End-to-end test stack for the OpenLDAP exporter and its JSON events stream.
#
# Runs cleanstart/openldap:2.6.13 (the same image as the reference
# MaximeWewer/OpenLDAP-docker-setup repo) with the slapo-accesslog and
# slapo-ppolicy overlays pre-seeded into cn=config via offline slapadd, the
# exporter image built from this repository with OPENLDAP_EVENTS_ENABLED=true
# and a "tools" sidecar that ships ldap clients so the trigger script can
# run from the host without depending on locally installed packages.
#
# Workflow:
#   ./setup.sh           # bootstrap data/ via offline slapadd
#   docker compose up -d # start openldap + exporter + tools
#   ./scripts/trigger-events.sh
#   tail -f output/openldap-events-$(date -u +%F).jsonl

networks:
  openldap-events-test:
    driver: bridge

services:
  openldap:
    image: cleanstart/openldap:2.6.13
    container_name: openldap-events-test
    hostname: openldap
    restart: unless-stopped
    ports:
      - "1389:389"
      - "1636:636"
    volumes:
      - ./data/slapd.d:/etc/openldap/slapd.d
      - ./data/openldap-data:/var/lib/openldap/openldap-data
      - ./data/accesslog-data:/var/lib/openldap/accesslog-data
      # TLS material referenced by olcTLS* in init-config/slapd-config.ldif.
      - ./certs:/etc/openldap/certs:ro
    networks:
      - openldap-events-test
    logging:
      driver: json-file
      options:
        "max-size": "10m"
        "max-file": "5"

  exporter:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: openldap-prometheus-exporter:test
    container_name: openldap-events-test-exporter
    depends_on:
      - openldap
    environment:
      # Connect over LDAPS so the exporter reads the server's live TLS chain
      # for the openldap_tls_cert_not_after_timestamp_seconds metric. The CA
      # is mounted below and the cert SAN matches "openldap", so full
      # verification succeeds (no skip-verify needed).
      LDAP_URL: "ldaps://openldap:636"
      LDAP_USERNAME: "cn=adminconfig,cn=config"
      LDAP_PASSWORD: "adminpasswordconfig"
      LDAP_SERVER_NAME: "openldap-events-test"
      LDAP_TLS: "true"
      LDAP_TLS_CA: "/etc/openldap/certs/ca.crt"
      LDAP_UPDATE_EVERY: "15"
      LOG_LEVEL: "DEBUG"

      # Events stream — opt in, written to the mounted output directory with
      # daily rotation so the host can tail today's file directly.
      OPENLDAP_EVENTS_ENABLED: "true"
      OPENLDAP_EVENTS_INTERVAL: "5s"
      OPENLDAP_EVENTS_OUTPUT: "/var/log/openldap-events/openldap-events-{date}.jsonl"
      OPENLDAP_EVENTS_ROTATION: "daily"
    ports:
      - "9330:9330"
    volumes:
      - ./output:/var/log/openldap-events
      # CA used to verify the LDAPS server certificate (LDAP_TLS_CA above).
      - ./certs:/etc/openldap/certs:ro
    networks:
      - openldap-events-test

  # Long-running sidecar that ships ldapsearch / ldapmodify / ldapadd / ldapdelete
  # so trigger-events.sh can invoke them via "docker exec" without requiring the
  # host to have ldap-utils installed.
  tools:
    image: alpine:3.24
    container_name: openldap-events-test-tools
    command:
      - sh
      - -c
      - "apk add --no-cache openldap-clients >/dev/null && exec sleep infinity"
    depends_on:
      - openldap
    networks:
      - openldap-events-test
    restart: unless-stopped

  # Prometheus scraping the exporter — lets Grafana render the dashboards.
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: openldap-events-test-prometheus
    depends_on:
      - exporter
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
    networks:
      - openldap-events-test
    restart: unless-stopped

  # Grafana auto-provisioned with the Prometheus datasource and the repo
  # dashboards (including the new "TLS Certificates" row). Open
  # http://localhost:3000 — anonymous access is enabled as Admin for the demo.
  grafana:
    image: grafana/grafana:12.2.9
    container_name: openldap-events-test-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - openldap-events-test
    restart: unless-stopped
