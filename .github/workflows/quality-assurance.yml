name: Quality assurance

# Quality assurance pipeline for the OpenLDAP Prometheus Exporter:
# format/vet gate, unit + integration tests, consolidated lint via
# golangci-lint, security scanning (gosec + govulncheck + dependency
# review), coverage merge, and a final summary step.
#
# Triggered automatically on pushes to main and pull requests, plus
# manual runs with selectable test subsets via workflow_dispatch.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      test_selection:
        description: "Select tests to run"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "unit-only"
          - "integration-only"
          - "static-analysis-only"
          - "security-only"
          - "unit-integration"
          - "coverage-only"
          - "analysis-security"

env:
  GO_VERSION: "1.26.2"
  # Normalised test selection: empty on push/PR → "all"; respected verbatim
  # on workflow_dispatch so manual runs can still pick a subset.
  TEST_SELECTION: ${{ inputs.test_selection || 'all' }}

# Default permissions for all jobs
permissions:
  contents: read

# Cancel in-progress runs when a new commit lands on the same ref. Runs
# against main are left alone (cancel-in-progress is gated on PR/branch
# refs) so the mainline never loses a green run to a rebase.
concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pre-check:
    name: Pre-Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-environment
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check gofmt
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$diff"
            echo "Run 'gofmt -s -w .' locally and commit the result."
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 10
    if: ${{ contains(env.TEST_SELECTION, 'all') || contains(env.TEST_SELECTION, 'static-analysis') || contains(env.TEST_SELECTION, 'analysis') && env.TEST_SELECTION != 'coverage-only' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-environment
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10.1
          args: --timeout=5m

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 10
    if: ${{ contains(env.TEST_SELECTION, 'all') || contains(env.TEST_SELECTION, 'unit') || env.TEST_SELECTION == 'coverage-only' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-environment
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests with race detector and coverage
        timeout-minutes: 5
        run: go test -race -timeout=30s -coverprofile=unit-coverage.out -covermode=atomic ./...

      - name: Display unit test coverage
        run: |
          go tool cover -func=unit-coverage.out
          COVERAGE=$(go tool cover -func=unit-coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Unit Test Coverage: $COVERAGE%"
          echo "UNIT_COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Upload unit test coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: unit-coverage.out
          retention-days: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./unit-coverage.out
          flags: unittests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 15
    if: ${{ contains(env.TEST_SELECTION, 'all') || contains(env.TEST_SELECTION, 'integration') || env.TEST_SELECTION == 'coverage-only' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-environment
        with:
          go-version: ${{ env.GO_VERSION }}

      # The tests/docker/ stack is the single source of truth for the
      # OpenLDAP test environment: cleanstart/openldap:2.6.13 with
      # slapo-accesslog and slapo-ppolicy pre-seeded via offline slapadd.
      # CI reuses exactly what a developer runs locally, so "works on my
      # machine" and "works in CI" converge.
      - name: Bootstrap OpenLDAP via tests/docker/setup.sh
        working-directory: tests/docker
        run: ./setup.sh

      - name: Start OpenLDAP service
        working-directory: tests/docker
        run: |
          docker compose up -d openldap
          echo "Waiting for slapd to become ready on 127.0.0.1:1389..."
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 1389; then
              echo "slapd is up"
              exit 0
            fi
            sleep 1
          done
          echo "slapd failed to start within 30s" >&2
          docker compose logs openldap
          exit 1

      - name: Run integration tests with coverage
        env:
          TEST_LDAP_URL: ldap://localhost:1389
          TEST_LDAP_USERNAME: cn=adminconfig,cn=config
          TEST_LDAP_PASSWORD: adminpasswordconfig
        run: go test -tags=integration -v -coverprofile=integration-coverage.out -covermode=atomic -coverpkg=./pkg/...,./cmd/... ./tests/...

      - name: Dump OpenLDAP logs on failure
        if: failure()
        working-directory: tests/docker
        run: docker compose logs openldap

      - name: Tear down OpenLDAP service
        if: always()
        working-directory: tests/docker
        run: docker compose down -v

      - name: Display integration test coverage
        run: |
          go tool cover -func=integration-coverage.out
          COVERAGE=$(go tool cover -func=integration-coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Integration Test Coverage: $COVERAGE%"
          echo "INTEGRATION_COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Upload integration test coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration-coverage.out
          retention-days: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./integration-coverage.out
          flags: integrationtests

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 10
    if: ${{ contains(env.TEST_SELECTION, 'all') || contains(env.TEST_SELECTION, 'security') || contains(env.TEST_SELECTION, 'analysis') && env.TEST_SELECTION != 'coverage-only' }}

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-environment
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4
          gosec -fmt sarif -out results.sarif ./... || true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Check for known vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Dependency review (Pull Request only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Check dependencies (Push events)
        if: github.event_name == 'push'
        run: |
          echo "Checking Go module dependencies..."
          go list -m -u all
          echo "Verifying module integrity..."
          go mod verify

  coverage-report:
    name: Combined Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 5
    if: |
      always() &&
      !cancelled() &&
      (needs.unit-tests.result == 'success' || needs.integration-tests.result == 'success')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-environment
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download unit test coverage
        if: needs.unit-tests.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: ./coverage-reports/

      - name: Download integration test coverage
        if: needs.integration-tests.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage
          path: ./coverage-reports/

      - name: Merge coverage reports
        run: |
          echo "Merging coverage reports..."

          # Install gocovmerge tool (pinned)
          go install github.com/wadey/gocovmerge@b5bfa59ec0adc420475f97f89b58045c721d761c

          # List available coverage files
          echo "Available coverage files:"
          ls -la ./coverage-reports/ || echo "No coverage reports found"

          # Merge coverage files if they exist
          if [ -f "./coverage-reports/unit-coverage.out" ] && [ -f "./coverage-reports/integration-coverage.out" ]; then
            echo "Merging unit and integration test coverage..."
            gocovmerge ./coverage-reports/unit-coverage.out ./coverage-reports/integration-coverage.out > combined-coverage.out
          elif [ -f "./coverage-reports/unit-coverage.out" ]; then
            echo "Only unit test coverage available..."
            cp ./coverage-reports/unit-coverage.out combined-coverage.out
          elif [ -f "./coverage-reports/integration-coverage.out" ]; then
            echo "Only integration test coverage available..."
            cp ./coverage-reports/integration-coverage.out combined-coverage.out
          else
            echo "No coverage reports found to merge"
            exit 1
          fi

      - name: Generate combined coverage report
        run: |
          echo "## Combined Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          go tool cover -func=combined-coverage.out | tee coverage-summary.txt

          TOTAL_COVERAGE=$(go tool cover -func=combined-coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Coverage: ${TOTAL_COVERAGE}%**" >> $GITHUB_STEP_SUMMARY

          # Coverage threshold check
          THRESHOLD=70
          if (( $(echo "$TOTAL_COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage is below ${THRESHOLD}% threshold" >> $GITHUB_STEP_SUMMARY
            echo "Coverage ${TOTAL_COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage meets the ${THRESHOLD}% threshold" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate HTML coverage report
        run: |
          go tool cover -html=combined-coverage.out -o coverage-report.html
          echo "HTML coverage report generated"

      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: |
            combined-coverage.out
            coverage-report.html
            coverage-summary.txt
          retention-days: 7

      - name: Upload to Codecov (combined)
        uses: codecov/codecov-action@v5
        with:
          files: ./combined-coverage.out
          flags: combined
          name: combined-coverage

  test-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      [
        lint,
        unit-tests,
        integration-tests,
        security,
        coverage-report,
      ]
    if: always() && !cancelled()
    permissions:
      contents: read

    steps:
      - name: Pipeline Results Summary
        run: |
          echo "## Quality Assurance Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || (needs.lint.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || (needs.unit-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || (needs.integration-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Report | ${{ needs.coverage-report.result == 'success' && '✅ Passed' || (needs.coverage-report.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Analysis | ${{ needs.security.result == 'success' && '✅ Passed' || (needs.security.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Selection:** ${{ env.TEST_SELECTION }}" >> $GITHUB_STEP_SUMMARY
